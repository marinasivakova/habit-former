<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Redirecting…</title>
        <script>
            // On 404, fetch index.html and replace the document
            fetch("/habit-former/index.html")
                .then((resp) => resp.text())
                .then((html) => {
                    document.open();
                    document.write(html);
                    document.close();
                });
        </script>
    </head>
    <body>
        <p>Redirecting…</p>
    </body>
</html>
